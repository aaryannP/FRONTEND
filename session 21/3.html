<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question 3 - Add Playlist to myPlaylists</title>
    
</head>
<body>
    <div class="container">
        <h3>Add Playlist (myPlaylists)</h3>
        <input type="text" id="name" placeholder="Playlist Name">
        <input type="text" id="url" placeholder="Playlist URL">
        <button onclick="handleFormSubmit()">Save Playlist</button>
        <div id="result"></div>
    </div>

    <script>
        function addPlaylistLink(linkObj) {
            let myPlaylists = JSON.parse(localStorage.getItem('myPlaylists')) || [];
            myPlaylists.push(linkObj);
            localStorage.setItem('myPlaylists', JSON.stringify(myPlaylists));
            document.getElementById('result').innerText = "Updated myPlaylists: " + JSON.stringify(myPlaylists);
        }

        function handleFormSubmit() {
            const name = document.getElementById('name').value;
            const url = document.getElementById('url').value;
            if(name && url) {
                addPlaylistLink({ name: name, url: url });
            }
        }
    </script>
</body>
</html>
