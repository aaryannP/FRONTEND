<!DOCTYPE html>
<html>
<head>
    <title>Question 3</title>
</head>
<body>
    <script>
        fetch('https://jsonplaceholder.typicode.com/posts')
            .then(response => response.json())
            .then(posts => {
                const firstFive = posts.slice(0, 5);
                firstFive.forEach((post, index) => {
                    console.log(`${index + 1}: ${post.title}`);
                });
            });
    </script>
</body>
</html>
