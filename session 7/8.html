<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question 8</title>
    
</head>
<body>

    <button id="likeBtn">Like 0</button>

    <script>
        let count = 0;
        const btn = document.getElementById('likeBtn');
        
        btn.addEventListener('click', function() {
            count++;
            btn.innerText = "Like " + count;
        });
    </script>
</body>
</html>
