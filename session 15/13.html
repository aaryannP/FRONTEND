<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question 13</title>
</head>
<body>
    <script>
        class FlipkartProduct {
            constructor(title, price, rating) {
                this.title = title;
                this.price = price;
                this.rating = rating;
            }

            showProductInfo() {
                console.log(`${this.title} - ₹${this.price} - ${this.rating}⭐`);
            }
        }

        const phone = new FlipkartProduct('Redmi Note 12 Pro', 18999, 4.5);
        phone.showProductInfo();
    </script>
</body>
</html>
