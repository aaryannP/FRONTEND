<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question 6</title>
</head>
<body>
    <h3>Create Spotify Playlist</h3>
    <input type="text" id="playName" placeholder="Playlist Name"><br>
    <div id="nameError" style="color: red; display: none;">Playlist name is required.</div><br>
    
    <textarea id="playDesc" placeholder="Description"></textarea><br>
    <div id="descError" style="color: red; display: none;">Description is required.</div><br>
    
    <button id="createBtn">Create</button>

    <script>
        document.getElementById('createBtn').addEventListener('click', () => {
            const name = document.getElementById('playName').value.trim();
            const desc = document.getElementById('playDesc').value.trim();
            
            document.getElementById('nameError').style.display = name === "" ? "block" : "none";
            document.getElementById('descError').style.display = desc === "" ? "block" : "none";
        });
    </script>
</body>
</html>
