<!DOCTYPE html>

</head>
<body>
    <script>
        const formatFollowers = (number) => {
            if (number >= 1000000) {
                return (number / 1000000).toFixed(1) + 'M';
            } else if (number >= 1000) {
                return (number / 1000).toFixed(1) + 'K';
            }
            return number.toString();
        };

        console.log(formatFollowers(1500));
    </script>
</body>
</html>
