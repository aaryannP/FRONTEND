<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question 8</title>
</head>
<body>
    <div id="storyContainer">
        <div>
            <span>Story 1</span>
            <span class="close-story">X</span>
        </div>
        <div>
            <span>Story 2</span>
            <span class="close-story">X</span>
        </div>
    </div>

    <script>
        const container = document.getElementById('storyContainer');
        container.addEventListener('click', function(event) {
            if (event.target.classList.contains('close-story')) {
                event.target.parentElement.remove();
            }
        });
    </script>
</body>
</html>
