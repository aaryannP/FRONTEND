<body>
    <script>
        const getFollowersSummary = (...counts) => {
            let total = 0;
            for(let i = 0; i < counts.length; i++) {
                total += counts[i];
            }
            return `Total followers: ${total}`;
        };

        console.log(getFollowersSummary(500, 400, 300));
    </script>
</body>
