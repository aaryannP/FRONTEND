<body>
    <script>
        const addToCartArrow = (...prices) => {
            let total = 0;
            for(let i = 0; i < prices.length; i++) {
                total += prices[i];
            }
            return total;
        };

        console.log(addToCartArrow(100, 200, 300));
    </script>
