<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Playlist Manager</title>
    
</head>
<body>

<div class="container">
    <h2>Create Playlist</h2>
    <form id="playlistForm">
        <div class="form-group">
            <label for="name">Playlist Name</label>
            <input type="text" id="name" required placeholder="My Awesome Playlist">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" placeholder="Add an optional description"></textarea>
        </div>
        <button type="submit">Create</button>
    </form>
</div>

<div class="playlist-list">
    <h3>Your Playlists</h3>
    <div id="displayArea"></div>
</div>

<script>
    const playlists = [];

    document.getElementById('playlistForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const description = document.getElementById('description').value;
        
        playlists.push({ name, description });
        
        renderPlaylists();
        this.reset();
    });

    function renderPlaylists() {
        const displayArea = document.getElementById('displayArea');
        displayArea.innerHTML = '';
        
        playlists.forEach(playlist => {
            const div = document.createElement('div');
            div.className = 'playlist-item';
            div.innerHTML = `<h4>\${playlist.name}</h4><p>\${playlist.description || 'No description provided.'}</p>`;
            displayArea.appendChild(div);
        });
    }
</script>

</body>
</html>
