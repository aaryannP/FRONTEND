<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Manager - Delete Feature</title>
    
</head>
<body>

<div class="box">
    <h2>Add Restaurant</h2>
    <form id="resForm">
        <div class="form-group"><label>Name</label><input type="text" id="name" required></div>
        <div class="form-group"><label>Cuisine</label><input type="text" id="cuisine" required></div>
        <div class="form-group"><label>Rating</label><input type="number" id="rating" min="1" max="5" step="0.1" required></div>
        <button type="submit">Submit</button>
    </form>
</div>

<div id="list"><h3>Restaurants List</h3></div>

<script>
    const restaurants = [];

    document.getElementById('resForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const cuisine = document.getElementById('cuisine').value;
        const rating = document.getElementById('rating').value;
        
        restaurants.push({ name, cuisine, rating });
        render();
        this.reset();
    });

    function render() {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '<h3>Restaurants List</h3>';
        restaurants.forEach((r, index) => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<div><strong>\${r.name}</strong> - \${r.cuisine} (\${r.rating}★)</div>
                             <button class="btn-del" onclick="deleteItem(\${index})">Delete</button>`;
            listDiv.appendChild(div);
        });
    }

    window.deleteItem = function(index) {
        restaurants.splice(index, 1);
        render();
    }
</script>

</body>
</html>
