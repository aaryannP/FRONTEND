<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Restaurant Manager</title>
    
</head>
<body>

<div class="container">
    <h2 id="formTitle">Add New Restaurant</h2>
    <form id="restaurantForm">
        <input type="hidden" id="editIndex">
        <div class="form-group">
            <label for="name">Restaurant Name</label>
            <input type="text" id="name" required placeholder="e.g. Spice Kitchen">
        </div>
        <div class="form-group">
            <label for="cuisine">Cuisine Type</label>
            <input type="text" id="cuisine" required placeholder="e.g. Italian">
        </div>
        <div class="form-group">
            <label for="rating">Rating (1-5)</label>
            <input type="number" id="rating" min="1" max="5" step="0.1" required placeholder="e.g. 4.2">
        </div>
        <button type="submit" id="submitBtn">Add Restaurant</button>
    </form>
</div>

<div class="restaurant-list">
    <h3>Restaurants List</h3>
    <div id="displayArea"></div>
</div>

<script>
    let restaurants = [];

    document.getElementById('restaurantForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const cuisine = document.getElementById('cuisine').value;
        const rating = document.getElementById('rating').value;
        const editIndex = document.getElementById('editIndex').value;

        if (editIndex !== "") {
            restaurants[editIndex] = { name, cuisine, rating: parseFloat(rating) };
            document.getElementById('editIndex').value = "";
            document.getElementById('formTitle').innerText = "Add New Restaurant";
            document.getElementById('submitBtn').innerText = "Add Restaurant";
        } else {
            restaurants.push({ name, cuisine, rating: parseFloat(rating) });
        }
        renderRestaurants();
        this.reset();
    });

    function renderRestaurants() {
        const displayArea = document.getElementById('displayArea');
        displayArea.innerHTML = '';
        restaurants.forEach((res, idx) => {
            const div = document.createElement('div');
            div.className = 'restaurant-item';
            div.innerHTML = `
                <h4>\${res.name} <span class="rating-badge">\${res.rating} ★</span></h4>
                <p>Cuisine: \${res.cuisine}</p>
                <div class="actions">
                    <button class="btn-sm btn-edit" onclick="editRes(\${idx})">Edit</button>
                    <button class="btn-sm" onclick="deleteRes(\${idx})">Delete</button>
                </div>
            `;
            displayArea.appendChild(div);
        });
    }

    window.editRes = function(idx) {
        document.getElementById('name').value = restaurants[idx].name;
        document.getElementById('cuisine').value = restaurants[idx].cuisine;
        document.getElementById('rating').value = restaurants[idx].rating;
        document.getElementById('editIndex').value = idx;
        document.getElementById('formTitle').innerText = "Edit Restaurant";
        document.getElementById('submitBtn').innerText = "Update Details";
    }

    window.deleteRes = function(idx) {
        restaurants.splice(idx, 1);
        renderRestaurants();
    }
</script>

</body>
</html>
