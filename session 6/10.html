<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question 10</title>
    
</head>
<body>

    <input type="text" id="colorInput" placeholder="Type a color (e.g., pink)">
    <div id="moodbox"></div>

    <script>
        var colorInput = document.getElementById('colorInput');
        var moodbox = document.getElementById('moodbox');

        colorInput.addEventListener('input', function() {
            moodbox.style.backgroundColor = colorInput.value;
        });
    </script>
</body>
</html>
