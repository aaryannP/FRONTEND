<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question 4</title>
</head>
<body>
    <div id="title-ui"></div>
    <div id="duration-ui"></div>

    <script type="module" id="spotifyUtils">
        export function formatSongTitle(title) {
            return title.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        }
        export function getSongDurationInMinutes(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
    </script>

    <script type="module">
        const code = document.getElementById('spotifyUtils').text;
        const blob = new Blob([code], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);

        import(url).then(module => {
            const formattedTitle = module.formatSongTitle("dil bechara kapoor");
            const formattedDuration = module.getSongDurationInMinutes(215);

            console.log(formattedTitle);
            console.log(formattedDuration);

            document.getElementById('title-ui').innerText = formattedTitle;
            document.getElementById('duration-ui').innerText = formattedDuration;
        });
    </script>
</body>
</html>
