<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question 9</title>
</head>
<body>
    <script>
        function getOrderStatus(orderId) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (orderId % 2 === 0) {
                        resolve('Order delivered');
                    } else {
                        reject('Order not found');
                    }
                }, 1500);
            });
        }

        getOrderStatus(102)
            .then((result) => console.log(result))
            .catch((error) => console.log(error));

        getOrderStatus(103)
            .then((result) => console.log(result))
            .catch((error) => console.log(error));
    </script>
</body>
</html>
