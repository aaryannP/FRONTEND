<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Question 2</title>
</head>
<body>
    <div id="feed-status"></div>

    <script>
        const statusElement = document.getElementById('feed-status');
        setTimeout(() => {
            statusElement.textContent = 'Loading your feed...';
            setTimeout(() => {
                statusElement.textContent = 'Feed loaded!';
            }, 2000);
        }, 2000);
    </script>
</body>
</html>
